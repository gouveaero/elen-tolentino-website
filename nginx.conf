server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml image/webp;
    gzip_min_length 1024;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js static export: each route is a folder with index.html
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }
}
